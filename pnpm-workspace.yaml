packages:
  - 'packages/*'
  - 'frontend'
  - 'backend'

# pnpm 11 writes this map when build scripts need approval. Amplify/CI is
# non-interactive, so keep the known native/binary packages explicitly allowed.
allowBuilds:
  bufferutil: true
  esbuild: true
  keccak: true
  sharp: true
  utf-8-validate: true

# Keep compatibility with pnpm versions that read the list form.
onlyBuiltDependencies:
  - bufferutil
  - esbuild
  - keccak
  - sharp
  - utf-8-validate

# Keep run-script dependency checks from failing on optional native packages in CI.
verifyDepsBeforeRun: false
